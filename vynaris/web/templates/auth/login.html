{% extends "base.html" %}
{% block title %}Sign in — Vynaris{% endblock %}
{% block content %}
<div class="slide-up-enter">
  <div class="flex items-center gap-3 mb-8 justify-center">
    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white font-bold">V</div>
    <div class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-slate-50">Vynaris</div>
  </div>

  <div class="card p-7">
    <h1 class="text-xl font-semibold tracking-tight text-slate-900 dark:text-slate-50">Sign in to {{ org.name }}</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Use the email and password you signed up with.</p>

    {% if error %}
    <div class="mt-4 p-3 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/30 rounded-md text-sm text-rose-700 dark:text-rose-300">
      {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="post" class="mt-6 space-y-4">
      <div>
        <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">Email</label>
        <input name="email" type="email" required autofocus class="input" value="{{ email or '' }}" />
      </div>
      <div>
        <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">Password</label>
        <input name="password" type="password" required class="input" />
      </div>
      <div class="pt-1">
        <button type="submit" class="btn btn-primary w-full">Sign in</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
