{% extends "base.html" %}
{% block title %}Invalid invite — Vynaris{% endblock %}
{% block content %}
<div class="slide-up-enter">
  <div class="flex items-center gap-3 mb-8 justify-center">
    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-white font-bold">V</div>
    <div class="text-2xl font-semibold tracking-tight text-slate-900 dark:text-slate-50">Vynaris</div>
  </div>
  <div class="card p-7 text-center">
    <div class="w-12 h-12 rounded-full bg-rose-100 dark:bg-rose-500/15 flex items-center justify-center mx-auto">
      <svg class="w-6 h-6 text-rose-600 dark:text-rose-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </div>
    <h1 class="text-lg font-semibold mt-4 text-slate-900 dark:text-slate-50">Invite not valid</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">{{ error }}</p>
    <div class="mt-5">
      <a href="/login" class="btn btn-ghost">Go to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
