services:
  postgres:
    image: postgres:16-alpine
    container_name: vynaris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vynaris
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vynaris_dev_password_change_me}
      POSTGRES_DB: vynaris
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - vynaris_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vynaris -d vynaris"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  vynaris_pgdata:
